# .github/workflows/ci-cd.yml
# ─────────────────────────────────────────────────────────────
# CI/CD Pipeline for Smart Bus Tracking System
#
# TRIGGERS:
#   push to main    → full pipeline: lint + test + deploy
#   push to develop → lint + test only
#   pull_request    → lint + test only
#
# JOBS:
#   1. test-backend  — Jest unit + integration tests
#   2. lint-frontend — ESLint on React code
#   3. build-frontend — Vite production build
#   4. deploy-backend  — Deploy to Render (main branch only)
#   5. deploy-frontend — Deploy to Vercel (main branch only)
# ─────────────────────────────────────────────────────────────

name: Smart Bus Tracker CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1: Backend Tests
  # ──────────────────────────────────────────────────────────
  test-backend:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: bus-tracking-backend/package-lock.json

      - name: Install backend dependencies
        working-directory: bus-tracking-backend
        run: npm ci

      - name: Run Jest tests with coverage
        working-directory: bus-tracking-backend
        env:
          NODE_ENV: test
          MONGODB_URI_TEST: mongodb://127.0.0.1:27017/bus_tracking_test
          JWT_ACCESS_SECRET: test_access_secret_min_32_chars_long_xyz
          JWT_REFRESH_SECRET: test_refresh_secret_min_32_chars_long_xyz
          JWT_ACCESS_EXPIRE: 24h
          JWT_REFRESH_EXPIRE: 30d
          CLIENT_URL: http://localhost:5173
        run: npm test -- --coverage --forceExit

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: bus-tracking-backend/coverage
          flags: backend
          fail_ci_if_error: false

  # ──────────────────────────────────────────────────────────
  # JOB 2: Frontend Lint & Build
  # ──────────────────────────────────────────────────────────
  build-frontend:
    name: 🏗️ Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: bus-tracking-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: bus-tracking-frontend
        run: npm ci

      - name: Create env file for build
        working-directory: bus-tracking-frontend
        run: |
          echo "VITE_API_URL=${{ secrets.VITE_API_URL || 'http://localhost:5000/api' }}" > .env
          echo "VITE_SOCKET_URL=${{ secrets.VITE_SOCKET_URL || 'http://localhost:5000' }}" >> .env

      - name: Build Vite production bundle
        working-directory: bus-tracking-frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: bus-tracking-frontend/dist
          retention-days: 7

  # ──────────────────────────────────────────────────────────
  # JOB 3: Deploy Backend to Render (main branch only)
  # ──────────────────────────────────────────────────────────
  deploy-backend:
    name: 🚀 Deploy Backend → Render
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy webhook
        run: |
          curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'
        # Set RENDER_DEPLOY_HOOK_URL in GitHub Secrets:
        # Render dashboard → your service → Settings → Deploy Hook → copy URL

  # ──────────────────────────────────────────────────────────
  # JOB 4: Deploy Frontend to Vercel (main branch only)
  # ──────────────────────────────────────────────────────────
  deploy-frontend:
    name: 🌐 Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        working-directory: bus-tracking-frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
